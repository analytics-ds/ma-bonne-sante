baseURL = "https://ma-bonne-sante.com/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Ma Bonne Santé"
theme = "ma-bonne-sante-theme"
paginate = 12
removePathAccents = true

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu principal (Accueil + Blog, les dropdowns Domaines/Besoins sont gérés dans le header partial)
[[menus.main]]
  name = "Accueil"
  pageRef = "/"
  weight = 1

[[menus.main]]
  name = "Blog"
  pageRef = "/blog"
  weight = 4

[params]
  description = "Guide expert en santé naturelle et bien-être : aromathérapie, gemmothérapie, fleurs de Bach, huiles essentielles et compléments alimentaires. Des solutions naturelles pour chaque besoin, validées par la science."
  author_name = "La Rédaction"
  author_url = "https://ma-bonne-sante.com/"
  author_job_title = "Équipe éditoriale"
  author_bio = "L'équipe éditoriale de Ma Bonne Santé réunit des passionnés de santé naturelle et de bien-être. Chaque article est documenté à partir de sources scientifiques fiables et rédigé dans le respect des bonnes pratiques YMYL."
  logo = "images/logo-ma-bonne-sante.png"

  # Catégories par domaine (modalités thérapeutiques)
  domaines = ["Aromathérapie", "Huiles Essentielles", "Huiles Végétales", "Gemmothérapie", "Fleurs de Bach", "Compléments Alimentaires"]

  # Catégories par besoin (usages santé et bien-être)
  besoins = ["Immunité et Défenses", "Sommeil et Détente", "Douleurs et Articulations", "Bien-être Féminin", "Digestion et Détox", "Minceur et Drainage", "Beauté et Soins", "Stress et Équilibre émotionnel", "Peurs et Angoisses", "Confiance et Estime de Soi", "Respiration", "Nuisibles"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changeFreq = "weekly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Désactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true
