<header class="site-header">
    <div class="header-container">
        <a href="{{ "/" | relURL }}" class="site-logo" aria-label="{{ .Site.Title }}">
            {{ .Site.Title }}
        </a>

        <nav class="site-nav" role="navigation" aria-label="Navigation principale">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | relURL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
                {{ .Name }}
            </a>
            {{ end }}
        </nav>

        <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
            <span class="hamburger"></span>
        </button>
    </div>

    <nav class="nav-mobile" aria-label="Navigation mobile">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="nav-link-mobile">{{ .Name }}</a>
        {{ end }}
    </nav>
</header>

<script>
(function() {
    var toggle = document.querySelector('.menu-toggle');
    var mobileNav = document.querySelector('.nav-mobile');
    if (toggle && mobileNav) {
        toggle.addEventListener('click', function() {
            var isOpen = mobileNav.classList.toggle('open');
            toggle.setAttribute('aria-expanded', String(isOpen));
        });
    }
})();
</script>
